services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./auth.db:/app/auth.db
      - ./escola.db:/app/escola.db
      - ./uploads:/app/uploads
    # (Optional) Environment variables for Telegram Bot
    # environment:
    #   - TELEGRAM_BOT_TOKEN=your_token_here
    restart: always

# All databases and user uploads are persisted on the host in the current directory.
