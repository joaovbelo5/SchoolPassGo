<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem — SchoolPassGo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="totem-body">

    <div class="totem-card shadow-sm">
        <div class="mb-4">
            <div class="brand-icon mx-auto mb-3" style="width:52px;height:52px;font-size:1.5rem">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h1 id="institutionName" class="fw-bold h4 mb-1">SchoolPassGo</h1>
            <p class="text-muted small">Controle de Acesso Escolar</p>
        </div>

        <!-- Feedback Area -->
        <div id="feedbackArea" class="d-none mb-4 pb-4 border-bottom">
            <div class="position-relative mx-auto mb-3" style="width:124px;height:124px">
                <img id="studentPhoto" src="" alt="Foto" class="totem-photo shadow-sm">
            </div>

            <h3 id="studentName" class="fw-bold mb-1" style="font-size:1.3rem">Nome do Aluno</h3>
            <p class="text-muted small mb-4">
                <span id="studentTurma"></span> &middot; <span id="studentTurno"></span>
            </p>

            <div id="statusBadge" class="w-100 py-3 fw-bold totem-badge-entrada">
                <!-- Preenchido via JS -->
            </div>
        </div>

        <!-- Input Area (Always Visible) -->
        <div id="inputSection" class="mb-2">
            <p class="text-muted mb-3" style="font-size:.95rem">Aproxime sua carteirinha do leitor</p>
            <input type="text" id="barcodeInput" class="totem-input" placeholder="Código de Barras" autocomplete="off"
                autofocus>
        </div>

        <div class="mt-5 d-flex justify-content-center gap-4 no-print">
            <a href="/" class="text-decoration-none text-muted small hover-green">
                <i class="bi bi-grid-fill me-1"></i>Painel
            </a>
            <a href="/admin" class="text-decoration-none text-muted small hover-green">
                <i class="bi bi-people-fill me-1"></i>Admin
            </a>
        </div>
    </div>

    <!-- Hidden CSS hack for hover effect since it's just raw HTML -->
    <style>
        .hover-green:hover {
            color: var(--green-600) !important;
        }
    </style>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/totem.js"></script>
</body>

</html>
